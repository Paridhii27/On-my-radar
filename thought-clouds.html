<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Thought Clouds — On my radar</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="./pages-common.css" />
    <link rel="stylesheet" href="./thought-clouds.css" />
  </head>
  <body class="page-thought-clouds">
    <a class="page-back" href="./index.html">← Back to radar</a>

    <canvas id="main-canvas"></canvas>

    <p class="thought-clouds-hint">
      Type a thought and press Enter. Blow into the mic to scatter the fleeting
      thoughts. Lingering thoughts dissappear on their own after a while.
    </p>

    <div class="thought-clouds-bar">
      <input
        type="text"
        id="thought-input"
        placeholder="Type a fleeting thought..."
        autocomplete="off"
        maxlength="120"
      />

      <div class="memory-toggle" id="memory-toggle">
        <span class="label-fleeting">Fleeting</span>
        <div class="switch"></div>
        <span class="label-permanent">Lingering</span>
      </div>

      <div class="status-indicator">
        <span class="dot" id="mic-status-dot"></span>
        <span class="thought-clouds-bar__mic-label">Mic</span>
      </div>
    </div>

    <script type="module" src="./src/thought-clouds-page.js"></script>
  </body>
</html>
